<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#FCFAF6"/>
      <stop offset="100%" stop-color="#ECE5D8"/>
    </radialGradient>
    
    <!-- 3D Shopify Green Gradient -->
    <linearGradient id="shopifyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A2D783"/>
      <stop offset="30%" stop-color="#7AB55C"/>
      <stop offset="100%" stop-color="#4E8233"/>
    </linearGradient>

    <!-- 3D Reflective Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CE"/>
      <stop offset="30%" stop-color="#E5BA42"/>
      <stop offset="70%" stop-color="#B28A18"/>
      <stop offset="100%" stop-color="#E5BA42"/>
    </linearGradient>

    <!-- Glass gloss overlay -->
    <linearGradient id="glassGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- High-end drop shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#544B3D" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Grid Lines -->
  <path d="M80 0V500M160 0V500M240 0V500M320 0V500" stroke="#E3DACB" stroke-width="1.5" opacity="0.6"/>
  <path d="M0 100H400M0 200H400M0 300H400M0 400H400" stroke="#E3DACB" stroke-width="1.5" opacity="0.6"/>

  <!-- Background Gear outline -->
  <circle cx="200" cy="235" r="115" stroke="#DECFAF" stroke-width="8" stroke-dasharray="24 16" fill="none"/>

  <!-- Glowing orb -->
  <circle cx="200" cy="235" r="110" fill="#7AB55C" opacity="0.08" filter="blur(35px)"/>

  <!-- Central Shopify Bag -->
  <g transform="translate(155, 185)" filter="url(#shadow)">
    <!-- Bag Handle -->
    <path d="M35 15 C35 -5, 55 -5, 55 15" fill="none" stroke="#7AB55C" stroke-width="5" stroke-linecap="round"/>
    <!-- Bag Body -->
    <path d="M15 20 L75 20 L68 98 L22 98 Z" fill="url(#shopifyGrad)"/>
    <!-- Highlight Overlay -->
    <path d="M15 20 L75 20 L68 98 L22 98 Z" fill="url(#glassGloss)" opacity="0.4"/>
    <!-- Shopify S logo -->
    <path d="M43 45 C43 38, 48 38, 48 43 C48 48, 41 47, 41 53 C41 58, 48 58, 48 53" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Crossed Gold Wrench & Hammer -->
  <g transform="translate(200, 235)" filter="url(#shadow)">
    <!-- Wrench -->
    <g transform="rotate(-30)">
      <rect x="-10" y="-80" width="20" height="110" rx="6" fill="url(#goldGrad)"/>
      <path d="M-22 -80 A 22 22 0 1 1 22 -80 L 12 -65 L -12 -65 Z" fill="url(#goldGrad)"/>
      <circle cx="0" cy="-80" r="10" fill="#ECE5D8"/>
      <!-- Ring head -->
      <circle cx="0" cy="30" r="15" fill="url(#goldGrad)"/>
      <circle cx="0" cy="30" r="8" fill="#ECE5D8"/>
    </g>
    <!-- Screwdriver / Hammer -->
    <g transform="rotate(45)">
      <rect x="-6" y="-95" width="12" height="135" rx="3" fill="#585145"/>
      <rect x="-14" y="20" width="28" height="40" rx="8" fill="url(#goldGrad)"/>
      <rect x="-14" y="20" width="28" height="40" rx="8" fill="url(#glassGloss)" opacity="0.4"/>
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M80 140 L90 152 L102 155 L90 158 L80 170 L70 158 L58 155 L70 152 Z" fill="url(#goldGrad)" opacity="0.95"/>
  <path d="M310 295 L318 307 L330 310 L318 313 L310 325 L302 313 L290 310 L302 307 Z" fill="#7AB55C" opacity="0.8"/>

  <!-- Service Text -->
  <text x="200" y="465" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="15" font-weight="800" fill="#3D362A" letter-spacing="1">BUG FIXES &amp; CODE MAINTENANCE</text>
</svg>